<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Goals Manager</title>
  <!-- Подключаем Font Awesome для иконок -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css"
        integrity="sha512-1hawoHRQ5yAfzh0P3RIPMsR1dLqGoVsGtA/RP+ZLo73IhKLz2zNHdf3vyzC7rm2oJX4fSbE9fN7XI+OkWdw=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />
  <!-- Новый стиль -->
  <link rel="stylesheet" href="styles_v3.css">
</head>
<body>
  <h1>Soft Goals Manager</h1>
  <!-- Форма добавления -->
  <form id="goal-form">
    <input id="goal-input" placeholder="Введите цель" />
    <input type="date" id="due-date-input" />
    <input id="category-input" placeholder="Категория" />
    <button type="submit">Добавить</button>
  </form>

  <!-- Блок фильтров -->
  <div id="filters">
    <label>
      Категория:
      <select id="filter-category">
        <option value="">&#1042;&#1089;&#1077;</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="filter-overdue" />
      Просроченные
    </label>
    <label>
      До срока (дней):
      <input type="number" id="filter-due-within" min="1" />
    </label>
    <label>
      Поиск:
      <input type="text" id="filter-search" placeholder="Поиск целей..." />
    </label>
    <button type="button" id="apply-filters">Применить фильтры</button>
  </div>

  <!-- Статистика и сортировка -->
  <div id="summary"></div>
  <label>
    Сортировать по:
    <select id="sort-by">
      <option value="none">Без сортировки</option>
      <option value="due">Сроку</option>
      <option value="category">Категории</option>
      <option value="completed">Статусу выполнения</option>
    </select>
  </label>

  <!-- Список целей -->
  <ul id="goals-list"></ul>

  <!-- Контейнер для уведомлений -->
  <div id="notifications"></div>

  <!-- Улучшенный скрипт -->
  <script src="new_script_v5.js"></script>
</body>
</html>
